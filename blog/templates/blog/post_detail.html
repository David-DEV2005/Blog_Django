<!DOCTYPE html>
<html>
<head>
    <title>{{ post.titulo }}</title>
</head>
<body>
    <h1>{{ post.titulo }}</h1>
    <p><strong>Tag:</strong> {{ post.tag.nome }} | <strong>Publicado em:</strong> {{ post.data_pub|date:"d/m/Y H:i" }}</p>
    <hr>
    <p>{{ post.texto }}</p>
    <br>
    <a href="{% url 'post_list' %}">⬅ Voltar para a lista</a>
</body>
</html>
